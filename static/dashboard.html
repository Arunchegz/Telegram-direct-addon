<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TGStream Dashboard</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.0.0/dist/chart.umd.min.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }
        
        .container {
            max-width: 1400px;
            margin: 0 auto;
        }
        
        .header {
            background: rgba(255, 255, 255, 0.95);
            padding: 30px;
            border-radius: 15px;
            margin-bottom: 30px;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.1);
        }
        
        .header h1 {
            color: #667eea;
            font-size: 28px;
            margin-bottom: 10px;
        }
        
        .header p {
            color: #666;
            font-size: 14px;
        }
        
        .grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 20px;
            margin-bottom: 30px;
        }
        
        .card {
            background: white;
            border-radius: 12px;
            padding: 25px;
            box-shadow: 0 5px 20px rgba(0, 0, 0, 0.1);
            border-left: 4px solid #667eea;
        }
        
        .card.warning {
            border-left-color: #f59e0b;
        }
        
        .card.success {
            border-left-color: #10b981;
        }
        
        .card.danger {
            border-left-color: #ef4444;
        }
        
        .card h3 {
            color: #333;
            font-size: 14px;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            margin-bottom: 12px;
            color: #999;
        }
        
        .card .value {
            font-size: 32px;
            font-weight: bold;
            color: #667eea;
            margin-bottom: 8px;
        }
        
        .card .subtext {
            font-size: 12px;
            color: #999;
        }
        
        .charts-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(400px, 1fr));
            gap: 20px;
            margin-bottom: 30px;
        }
        
        .chart-container {
            background: white;
            border-radius: 12px;
            padding: 25px;
            box-shadow: 0 5px 20px rgba(0, 0, 0, 0.1);
            position: relative;
            height: 400px;
        }
        
        .chart-container h3 {
            color: #333;
            font-size: 16px;
            font-weight: 600;
            margin-bottom: 20px;
        }
        
        .chart-wrapper {
            position: relative;
            height: 100%;
        }
        
        .refresh-btn {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            padding: 12px 24px;
            border-radius: 8px;
            cursor: pointer;
            font-weight: 600;
            font-size: 14px;
            transition: transform 0.2s;
        }
        
        .refresh-btn:hover {
            transform: translateY(-2px);
        }
        
        .status-indicator {
            display: inline-block;
            width: 12px;
            height: 12px;
            border-radius: 50%;
            margin-right: 8px;
            animation: pulse 2s infinite;
        }
        
        .status-indicator.good {
            background: #10b981;
        }
        
        .status-indicator.warning {
            background: #f59e0b;
        }
        
        .status-indicator.bad {
            background: #ef4444;
        }
        
        @keyframes pulse {
            0%, 100% {
                opacity: 1;
            }
            50% {
                opacity: 0.7;
            }
        }
        
        .footer {
            text-align: center;
            color: rgba(255, 255, 255, 0.7);
            font-size: 12px;
            margin-top: 30px;
        }
        
        .last-update {
            text-align: right;
            font-size: 12px;
            color: #999;
            margin-top: 15px;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>🎬 TGStream Dashboard</h1>
            <p>Real-time monitoring and performance analytics</p>
            <button class="refresh-btn" onclick="refreshData()">🔄 Refresh Now</button>
            <div class="last-update" id="lastUpdate">Last update: --</div>
        </div>
        
        <div class="grid" id="metricsGrid">
            <!-- Populated by JavaScript -->
        </div>
        
        <div class="charts-grid">
            <div class="chart-container">
                <h3>Cache Performance</h3>
                <div class="chart-wrapper">
                    <canvas id="cacheChart"></canvas>
                </div>
            </div>
            
            <div class="chart-container">
                <h3>Streaming Path Distribution</h3>
                <div class="chart-wrapper">
                    <canvas id="pathChart"></canvas>
                </div>
            </div>
            
            <div class="chart-container">
                <h3>Rate Limit Events (24h)</h3>
                <div class="chart-wrapper">
                    <canvas id="rateLimitChart"></canvas>
                </div>
            </div>
            
            <div class="chart-container">
                <h3>HTTP Success Rate</h3>
                <div class="chart-wrapper">
                    <canvas id="httpChart"></canvas>
                </div>
            </div>
        </div>
        
        <div class="footer">
            <p>Auto-refreshing every 5 seconds • Showing real-time data</p>
        </div>
    </div>
    
    <script>
        let cacheChart, pathChart, rateLimitChart, httpChart;
        
        async function refreshData() {
            try {
                const response = await fetch('/api/metrics');
                const data = await response.json();
                
                updateMetricsGrid(data);
                updateCharts(data);
                updateTime();
            } catch (error) {
                console.error('Failed to fetch metrics:', error);
            }
        }
        
        function updateTime() {
            const now = new Date().toLocaleTimeString();
            document.getElementById('lastUpdate').textContent = `Last update: ${now}`;
        }
        
        function updateMetricsGrid(data) {
            const grid = document.getElementById('metricsGrid');
            
            const metrics = [
                {
                    label: 'Cache Hit Rate',
                    value: data.cache.hit_rate_pct + '%',
                    class: data.cache.hit_rate_pct > 70 ? 'success' : 'warning'
                },
                {
                    label: 'Local Streaming Ratio',
                    value: data.streaming.local_ratio_pct + '%',
                    class: data.streaming.local_ratio_pct > 60 ? 'success' : 'warning'
                },
                {
                    label: 'Rate Limit Events (24h)',
                    value: data.rate_limits.total_events,
                    class: data.rate_limits.total_events < 50 ? 'success' : 'warning',
                    sub: `Avg wait: ${data.rate_limits.avg_wait_s}s`
                },
                {
                    label: 'HTTP Success Rate',
                    value: data.http.success_rate_pct + '%',
                    class: data.http.success_rate_pct > 99 ? 'success' : 'danger',
                    sub: `${data.http.errors} errors`
                },
                {
                    label: 'Active Downloads',
                    value: data.downloads.active,
                    class: 'success'
                },
                {
                    label: 'Total Proxy Requests',
                    value: data.http.proxy_requests.toLocaleString(),
                    class: 'success'
                },
            ];
            
            grid.innerHTML = metrics.map(m => `
                <div class="card ${m.class}">
                    <h3>${m.label}</h3>
                    <div class="value">${m.value}</div>
                    ${m.sub ? `<div class="subtext">${m.sub}</div>` : ''}
                </div>
            `).join('');
        }
        
        function updateCharts(data) {
            // Cache Chart
            const cacheCtx = document.getElementById('cacheChart').getContext('2d');
            if (cacheChart) cacheChart.destroy();
            cacheChart = new Chart(cacheCtx, {
                type: 'doughnut',
                data: {
                    labels: ['Cache Hits', 'Cache Misses'],
                    datasets: [{
                        data: [data.cache.hits, data.cache.misses],
                        backgroundColor: ['#10b981', '#f59e0b'],
                        borderColor: white,
                        borderWidth: 2
                    }]
                },
                options: {
                    responsive: true,
                    maintainAspectRatio: false,
                    plugins: {
                        legend: { position: 'bottom' }
                    }
                }
            });
            
            // Path Chart
            const pathCtx = document.getElementById('pathChart').getContext('2d');
            if (pathChart) pathChart.destroy();
            const pathLabels = Object.keys(data.streaming.paths);
            const pathValues = Object.values(data.streaming.paths);
            pathChart = new Chart(pathCtx, {
                type: 'pie',
                data: {
                    labels: pathLabels.map(p => p.replace('_', '-').toUpperCase()),
                    datasets: [{
                        data: pathValues,
                        backgroundColor: ['#667eea', '#764ba2', '#f093fb', '#4facfe'],
                        borderColor: 'white',
                        borderWidth: 2
                    }]
                },
                options: {
                    responsive: true,
                    maintainAspectRatio: false,
                    plugins: {
                        legend: { position: 'bottom' }
                    }
                }
            });
            
            // Rate Limit Events (simulated time series)
            const rateLimitCtx = document.getElementById('rateLimitChart').getContext('2d');
            if (rateLimitChart) rateLimitChart.destroy();
            rateLimitChart = new Chart(rateLimitCtx, {
                type: 'bar',
                data: {
                    labels: ['Hour 1', 'Hour 2', 'Hour 3', 'Hour 4', 'Hour 5', 'Hour 6'],
                    datasets: [{
                        label: 'Rate Limit Events',
                        data: [5, 8, 3, 6, 4, 7],
                        backgroundColor: '#f59e0b',
                        borderColor: '#d97706',
                        borderWidth: 1
                    }]
                },
                options: {
                    responsive: true,
                    maintainAspectRatio: false,
                    scales: {
                        y: { beginAtZero: true }
                    }
                }
            });
            
            // HTTP Success Rate
            const httpCtx = document.getElementById('httpChart').getContext('2d');
            if (httpChart) httpChart.destroy();
            const httpSuccess = data.http.success_rate_pct;
            httpChart = new Chart(httpCtx, {
                type: 'doughnut',
                data: {
                    labels: ['Success', 'Errors'],
                    datasets: [{
                        data: [httpSuccess, 100 - httpSuccess],
                        backgroundColor: ['#10b981', '#ef4444'],
                        borderColor: 'white',
                        borderWidth: 2
                    }]
                },
                options: {
                    responsive: true,
                    maintainAspectRatio: false,
                    plugins: {
                        legend: { position: 'bottom' }
                    }
                }
            });
        }
        
        // Initial load and auto-refresh
        refreshData();
        setInterval(refreshData, 5000);
    </script>
</body>
</html>
